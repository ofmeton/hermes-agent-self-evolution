version: 1
repo:
  hermes_agent_repo: /Users/rikukudo/.hermes/hermes-agent
  self_evolution_repo: /Users/rikukudo/Projects/hermes-agent-self-evolution

defaults:
  optimizer_model: openai/gpt-5-mini
  eval_model: openai/gpt-5-nano
  iterations: 3
  eval_source: synthetic
  max_estimated_cost_usd: 0.25
  min_improvement: 0.03
  max_size_growth_chars: 1500
  require_constraints_passed: true
  mode: report_only

targets:
  - skill: github-code-review
    enabled: true
    cadence: biweekly
    priority: 10
    max_estimated_cost_usd: 0.25
    notes: High ROI; diff/review quality is easy to inspect.

  - skill: systematic-debugging
    enabled: true
    cadence: monthly
    priority: 9
    max_estimated_cost_usd: 0.25
    notes: High leverage for dev work; review diff carefully for process bloat.

  - skill: session-retrospective
    enabled: true
    cadence: manual
    priority: 8
    iterations: 1
    holdout_limit: 2
    hermes_agent_repo: /Users/rikukudo/Projects/private-agents/all-good-ops/.claude
    max_estimated_cost_usd: 0.15
    notes: Claude/user-authored local skill; likely higher ROI than polished hub skills. Pilot with limited holdout first.

  - skill: stop-slop
    enabled: true
    cadence: weekly
    priority: 11
    iterations: 1
    holdout_limit: 3
    hermes_agent_repo: /Users/rikukudo/Projects/private-agents/all-good-ops/.claude
    max_estimated_cost_usd: 0.20
    notes: Cross-repo Claude-authored local skill (all-good-ops/.claude). Candidate capture verified 2026-06-28.

  - skill: hermes-agent
    enabled: false
    cadence: monthly
    priority: 7
    iterations: 1
    max_estimated_cost_usd: 0.20
    notes: Broad impact and long skill; keep disabled until smaller skills prove stable.

  - skill: google-workspace
    enabled: false
    cadence: monthly
    priority: 6
    notes: External API behavior needs a better golden dataset before automation.

  - skill: gmail-organization
    enabled: false
    cadence: monthly
    priority: 6
    notes: Useful for secretary workflow; requires privacy-safe eval dataset.
